# ────────────────────────────────────────────────
#  수집 설정 — "무엇을" 수집할지 정의한다 (코드 바깥 설정).
#  개별 종목은 나열하지 않는다: 유니버스(S&P500+Nasdaq100) 구성종목은
#  매 실행 ETF 보유종목(IVV/QQQ)에서 자동 수집한다.
#  자세한 설계: docs/data_dictionary.md 8장
# ────────────────────────────────────────────────

universe:
  # 분석 대상 지수. source 종류:
  #   wikipedia    → Wikipedia 구성종목 표 (기본, 무료·키불필요, ticker+회사명+섹터)
  #   etf_holdings → 운용사 공시 CSV(IVV/QQQ, 비중 포함). 실패 시 wikipedia 로 자동 폴백.
  sp500:     { enabled: true, source: wikipedia, etf: IVV }   # S&P 500  (BlackRock)
  nasdaq100: { enabled: true, source: wikipedia, etf: QQQ }   # Nasdaq-100 (Invesco)
  include_extra: []   # 지수에 없지만 강제로 넣을 티커 (예: ["BRK-B"])
  exclude:       []   # 강제 제외 티커 (탈출구)

indicators:
  # FRED 경제지표 — 손으로 관리하는 seed (적고 안정적). dim_indicator 의 소스.
  - { code: FEDFUNDS, name: Federal Funds Rate,   unit: "%",   source: FRED }
  - { code: CPIAUCSL, name: Consumer Price Index, unit: index, source: FRED }

settings:
  date_range:
    start: "2020-01-01"        # 이 날짜부터 수집 (종료일은 오늘까지 자동)
  price_source: alphavantage   # 주가 소스: alphavantage(무료 키 필요) | yfinance(전체·무제한, 키 불필요)
  max_symbols: 20              # 수집 종목 수 상한 (Alpha Vantage 무료 25회/일 대비). 0=무제한
